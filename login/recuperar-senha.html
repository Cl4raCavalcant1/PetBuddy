<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetBuddy | Recuperar Senha</title>
  <link rel="stylesheet" href="style.css"> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="topbar">
      <div class="container topbar-content">
        <p>A Saúde do seu Animalzinho é na PetMed</p>
        <a href="#" class="saiba-mais">Saber mais</a>
      </div>
    </div>
  
    <div class="navbar">
      <div class="container nav-container">
        <a href="../Home/index.html" class="logo-link">
          <img src="../assets/Logo Principal.png" alt="Logo PetBuddy" class="logo">
        </a>
  
        <nav class="menu">
          <a href="../Home/index.html">Início</a>
          <a href="#">Promoções</a>
          <a href="#">PetMed</a>
          <a href="#">PetLar</a>
          <a href="#">Contato</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="cadastro-wrapper container">
    <div class="cadastro-box">
        
        <div class="login-img-area">
            <img src="../assets/RecuperarSenha.png" alt="Pets PetBuddy" class="pet-recuperar-senha-img">
        </div>

        <div class="cadastro-form-area">
            <div class="cadastro-card card-recuperar">
                <h2>Recuperar Senha!</h2>
                
                <form>
                    <div class="form-group">
                        <label>Digite o seu E-mail</label>
                        <input type="email" placeholder="Insira seu E-mail aqui." required>
                    </div>

                    <p class="info-txt">Será Enviar um Link para o seu E-mail para Recuperar a Sua Senha!</p>

                    <div class="btn-create-container">
                        <button type="button" class="btn-create" onclick="window.location.href='recuperar-senha2.html'">Enviar Link</button>
                    </div>

                    <p class="reenviar-txt">Não recebeu? <a href="#">Reenviar Código para E-mail</a></p>
                </form>

            </div>
        </div>

    </div>
  </main>

</body>
</html>
