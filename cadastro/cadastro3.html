<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetBuddy | Confirme seu E-mail</title>
  <link rel="stylesheet" href="style.css"> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="topbar">
      <div class="container topbar-content">
        <p>A Saúde do seu Animalzinho é na PetMed</p>
        <a href="#" class="saiba-mais">Saber mais</a>
      </div>
    </div>
  
    <div class="navbar">
      <div class="container nav-container">
        <a href="../Home/index.html" class="logo-link">
          <img src="../assets/Logo Principal.png" alt="Logo PetBuddy" class="logo">
        </a>
  
        <nav class="menu">
          <a href="../Home/index.html">Início</a>
          <a href="#">Promoções</a>
          <a href="#">PetMed</a>
          <a href="#">PetLar</a>
          <a href="#">Contato</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="cadastro-wrapper container">
    <div class="cadastro-box">
        
        <div class="cadastro-img-area">
            <img src="../assets/PetCadastro.png" alt="Cachorro PetBuddy" class="pet-cadastro-img">
        </div>

        <div class="cadastro-form-area">
            
            <div class="cadastro-card card-confirmacao">
                <h2>Confirme o seu E-mail</h2>
                
                <form class="form-confirmacao">
                    <div class="form-group">
                        <label>Digite o Código que foi Enviado para o seu E-mail</label>
                        <input type="text" placeholder="Insira o Código aqui." required>
                    </div>

                    <p class="reenviar-txt">
                        Não recebeu? <a href="#">Reenviar Código para E-mail</a>
                    </p>

                    <div class="btn-create-container">
                        <button type="button" class="btn-create" onclick="window.location.href='../Home/logado.html'">Finalizar Cadastro</button>
                    </div>
                </form>

            </div>
        </div>

    </div>
  </main>

</body>
</html>
